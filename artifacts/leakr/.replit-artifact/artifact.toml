kind = "web"
previewPath = "/"
title = "Leakr"
version = "1.0.0"
id = "artifacts/leakr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18458

[services.development]
run = "pnpm --filter @workspace/leakr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/leakr", "run", "build" ]
publicDir = "artifacts/leakr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18458"
BASE_PATH = "/"
